                { title: "Keibubapaan & Anak-anak", icon: "fa-baby-carriage", count: kategoriKeibubapaan.length, data: kategoriKeibubapaan },
                { title: "Kewangan, Bisnes & Kerjaya", icon: "fa-wallet", count: kategoriKewangan.length, data: kategoriKewangan },
                { title: "Lain-Lain", icon: "fa-layer-group", count: kategoriLainLain.length, data: kategoriLainLain }
            ];

            // Fungsi utama untuk menjana paparan
            sections.forEach((section, index) => {
                // Bina struktur HTML untuk pengepala kategori
                const sectionHTML = document.createElement('div');
                sectionHTML.className = "mb-16"; // Jarak antara kategori
                
                sectionHTML.innerHTML = `
                    <div class="flex items-center justify-between mb-6 border-b border-gray-800 pb-3">
                        <h2 class="text-xl md:text-2xl font-semibold text-white flex items-center gap-3">
                            <div class="bg-brand/20 p-2 rounded-lg text-brand">
                                <i class="fas ${section.icon} fa-fw"></i>
                            </div>
                            Kategori: ${section.title} 
                            <span class="text-sm font-normal text-gray-500 ml-2 bg-dark-800 px-2 py-1 rounded-full">${section.count} Naskhah</span>
                        </h2>
                    </div>
                    
                    <!-- Grid Buku untuk kategori ini -->
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6 lg:gap-8" id="grid-${index}">
                    </div>
                `;
                
                mainContainer.appendChild(sectionHTML);
                
                // Cari kontena grid yang baru sahaja dibuat
                const gridContainer = document.getElementById(`grid-${index}`);

                // Masukkan buku-buku ke dalam grid kategori
                section.data.forEach(book => {
                    const card = document.createElement('div');
                    card.className = "glass-card rounded-2xl overflow-hidden group hover:-translate-y-2 hover:shadow-[0_20px_40px_-15px_rgba(242,161,84,0.3)] transition-all duration-300 flex flex-col h-full";
                    
                    const description = book.description || "";

                    card.innerHTML = `
                        <!-- Bahagian Gambar Muka Depan -->
                        <div class="relative w-full pt-[140%] overflow-hidden bg-dark-800 shrink-0">
                            <img 
                                src="${book.coverUrl}" 
                                alt="${book.title}" 
                                class="absolute inset-0 w-full h-full object-cover group-hover:scale-110 transition-transform duration-700 ease-in-out"
                                loading="lazy"
                                onerror="this.src='https://placehold.co/400x600/1e293b/475569?text=Tiada+Gambar'"
                            >
                            <!-- Overlay Hitam Semasa Hover -->
                            <div class="absolute inset-0 bg-gradient-to-t from-dark-900 via-dark-900/60 to-transparent opacity-80 sm:opacity-60 group-hover:opacity-90 transition-opacity duration-300"></div>
                            
                            <!-- Lencana (Badge) -->
                            <div class="absolute top-3 right-3 bg-dark-900/80 backdrop-blur text-brand text-[10px] sm:text-xs font-bold px-2 py-1 rounded shadow-lg border border-brand/20">
                                ID: ${book.id}
                            </div>
                        </div>
                        
                        <!-- Bahagian Maklumat & Butang -->
                        <div class="p-3 sm:p-4 flex flex-col flex-grow relative z-10 -mt-10 sm:-mt-12 bg-gradient-to-t from-dark-900 via-dark-900 to-transparent">
                            <!-- Tajuk -->
                            <h3 class="text-xs sm:text-sm font-semibold text-white mb-1 line-clamp-2 drop-shadow-md leading-snug shrink-0" title="${book.title}">
                                ${book.title}
                            </h3>
                            
                            <!-- Harga/Author -->
                            <p class="text-[10px] sm:text-xs text-brand mb-2 flex items-center gap-1.5 font-medium shrink-0">
                                <i class="fas fa-tag text-gray-400"></i> ${book.author}
                            </p>

                            <!-- Ruangan Deskripsi (Auto-Skrol dan Lebih Besar) -->
                            <div class="desc-scroll overflow-y-auto max-h-20 mb-3 flex-grow pr-1">
                                <p class="text-[11px] sm:text-xs text-gray-300 leading-relaxed text-justify">
                                    ${description}
                                </p>
                            </div>
                            
                            <!-- Butang Get Now -->
                            <a 
                                href="${book.driveLink}" 
                                target="_blank" 
                                class="mt-auto shrink-0 w-full py-1.5 sm:py-2 px-3 bg-white/5 hover:bg-brand text-brand hover:text-dark-900 border border-brand/50 hover:border-brand text-center font-medium rounded-lg transition-all duration-300 transform active:scale-95 flex items-center justify-center gap-1.5 text-[11px] sm:text-xs backdrop-blur-sm"
                            >
                                <i class="fas fa-shopping-cart text-green-400"></i> 
                                <span>Get Now</span>
                            </a>
                        </div>
                    `;
                    
                    gridContainer.appendChild(card);
                });
            });
        });
    </script>
</body>
</html>
